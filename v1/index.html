<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>장비제조 ERP 테스트 v1.0</title>
<style>
:root{--bg:#f4f6f9;--card:#fff;--line:#e2e8f0;--txt:#1e293b;--sub:#64748b;--pri:#2563eb;--pri2:#1d4ed8;--ok:#16a34a;--warn:#d97706;--bad:#dc2626;--nav:#0f172a;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--txt);font-size:13px;display:flex;min-height:100vh}
aside{width:200px;background:var(--nav);color:#cbd5e1;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
aside h1{font-size:15px;color:#fff;padding:16px 14px 10px;border-bottom:1px solid #1e293b}
aside h1 small{display:block;font-size:10px;color:#64748b;font-weight:normal;margin-top:3px}
aside a{display:block;padding:10px 16px;color:#cbd5e1;text-decoration:none;font-size:13px;border-left:3px solid transparent}
aside a:hover{background:#1e293b}
aside a.on{background:#1e293b;color:#fff;border-left-color:var(--pri);font-weight:bold}
aside .foot{padding:12px 14px;font-size:11px;color:#475569;border-top:1px solid #1e293b;margin-top:12px}
aside .foot button{width:100%;margin-top:6px}
main{flex:1;padding:18px 22px;max-width:1200px}
h2{font-size:18px;margin-bottom:4px}
h3{font-size:14px;margin:14px 0 8px}
.crumb{font-size:12px;color:var(--sub);margin-bottom:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:14px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px;cursor:pointer}
.stat:hover{border-color:var(--pri);box-shadow:0 1px 4px rgba(37,99,235,.15)}
.stat .t{font-size:12px;color:var(--sub)}
.stat .v{font-size:19px;font-weight:bold;margin-top:4px}
.stat .s{font-size:11px;color:var(--sub);margin-top:2px}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{background:#f8fafc;font-size:12px;color:var(--sub);text-align:left;padding:7px 8px;border-bottom:2px solid var(--line);white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:hover td{background:#f8fafc}
td.r,th.r{text-align:right}
td.c,th.c{text-align:center}
.num{font-variant-numeric:tabular-nums}
a.lnk{color:var(--pri);cursor:pointer;text-decoration:none}
a.lnk:hover{text-decoration:underline}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;white-space:nowrap;cursor:default}
.b-gray{background:#f1f5f9;color:#475569}.b-blue{background:#dbeafe;color:#1d4ed8}.b-green{background:#dcfce7;color:#15803d}.b-amber{background:#fef3c7;color:#b45309}.b-red{background:#fee2e2;color:#b91c1c}.b-purple{background:#f3e8ff;color:#7e22ce}
button{font-family:inherit;font-size:12px;padding:6px 12px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;color:var(--txt)}
button:hover{background:#f1f5f9}
button.pri{background:var(--pri);border-color:var(--pri);color:#fff}
button.pri:hover{background:var(--pri2)}
button.danger{color:var(--bad);border-color:#fecaca}
button.sm{padding:3px 8px;font-size:11px}
button:disabled{opacity:.45;cursor:not-allowed}
input,select,textarea{font-family:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--txt)}
input:focus,select:focus,textarea:focus{outline:2px solid #bfdbfe;border-color:var(--pri)}
input.r{text-align:right}
input:disabled,select:disabled{background:#f1f5f9;color:var(--sub)}
.frm{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.frm label{display:block;font-size:11px;color:var(--sub);margin-bottom:3px}
.frm .full{grid-column:1/-1}
.frm input,.frm select,.frm textarea{width:100%}
.bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.bar .sp{flex:1}
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--line);margin-bottom:12px}
.tabs a{padding:8px 16px;font-size:13px;color:var(--sub);text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer}
.tabs a.on{color:var(--pri);border-bottom-color:var(--pri);font-weight:bold}
.linkpanel{background:#f8fafc;border:1px dashed #cbd5e1;border-radius:8px;padding:10px 12px;font-size:12px;margin-top:10px}
.linkpanel b{color:var(--sub);font-size:11px;display:block;margin-bottom:5px}
.linkpanel .row{margin:3px 0}
.warnbox{background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:8px 10px;font-size:12px;color:#92400e;margin:8px 0}
.okbox{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:8px 10px;font-size:12px;color:#166534;margin:8px 0}
#modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;z-index:50}
#modal{position:fixed;top:6vh;left:50%;transform:translateX(-50%);width:min(760px,94vw);max-height:86vh;overflow-y:auto;background:#fff;border-radius:10px;padding:18px;display:none;z-index:51;box-shadow:0 10px 40px rgba(0,0,0,.25)}
#modal h3{margin-top:0}
.mini{font-size:11px;color:var(--sub)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.gaugewrap{background:#e2e8f0;border-radius:6px;height:14px;position:relative;overflow:hidden}
.gauge{height:100%;border-radius:6px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:99;opacity:0;transition:opacity .3s}
.kbd{background:#f1f5f9;border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-size:11px}
</style>
</head>
<body>
<aside>
  <h1>장비제조 ERP <small>테스트 v1.0 · 수주생산형</small></h1>
  <nav id="nav"></nav>
  <div class="foot">
    데이터는 이 브라우저에 저장됩니다.
    <button class="sm" onclick="exportJson()">백업(JSON)</button>
    <button class="sm" onclick="resetSeed()">샘플로 초기화</button>
    <button class="sm danger" onclick="wipeAll()">전체 삭제</button>
  </div>
</aside>
<main id="main"></main>
<div id="modal-bg" onclick="closeModal()"></div>
<div id="modal"></div>
<div id="toast" class="toast"></div>
<script>
'use strict';
/* ================= 데이터 계층 ================= */
const LS_KEY='erp_test_v1';
let DB=null;
function saveDB(){localStorage.setItem(LS_KEY,JSON.stringify(DB));}
function loadDB(){try{DB=JSON.parse(localStorage.getItem(LS_KEY));}catch(e){DB=null;}
  if(!DB||!DB.companies){DB=seedData();saveDB();}}
let _uidc=0;
function uid(p){_uidc++;return p+Date.now().toString(36)+(_uidc%1000).toString(36)+Math.random().toString(36).slice(2,5);}
function docNo(pfx,dateStr){const y=(dateStr||today()).slice(0,4);const k=pfx+y;DB.seq=DB.seq||{};DB.seq[k]=(DB.seq[k]||0)+1;return pfx+y+'-'+String(DB.seq[k]).padStart(4,'0');}
function today(){return new Date().toISOString().slice(0,10);}
function addDays(d,n){const t=new Date(d);t.setDate(t.getDate()+n);return t.toISOString().slice(0,10);}
function fmt(n){return (n==null||isNaN(n))?'0':Math.round(n).toLocaleString('ko-KR');}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.opacity=1;clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity=0,2200);}
function byId(arr,id){return arr.find(x=>x.id===id);}
function co(id){return byId(DB.companies,id)||{name:'(삭제됨)'};}
function touch(o){o.updatedAt=new Date().toISOString();}

/* ---- 계산 헬퍼 (미수금은 저장하지 않고 항상 계산) ---- */
function lineTotals(lines){let s=0,v=0;(lines||[]).forEach(l=>{s+=l.supply||0;v+=l.vat||0;});return{supply:s,vat:v,total:s+v};}
function calcLine(l,taxExempt){l.qty=+l.qty||0;l.price=Math.round(+l.price||0);l.supply=Math.round(l.qty*l.price);l.vat=taxExempt?0:Math.round(l.supply*0.1);return l;}
function instAlloc(instId){return DB.allocs.filter(a=>a.targetType==='installment'&&a.targetId===instId).reduce((s,a)=>s+a.amount,0);}
function instRemain(inst){return inst.amount-instAlloc(inst.id);}
function ptransAlloc(tid){return DB.allocs.filter(a=>a.targetType==='purchaseTrans'&&a.targetId===tid).reduce((s,a)=>s+a.amount,0);}
function bankAllocated(bid){return DB.allocs.filter(a=>a.bankId===bid).reduce((s,a)=>s+a.amount+(a.fee||0),0);}
function bankRemain(b){return Math.abs(b.amount)-bankAllocated(b.id);}
function orderInsts(oid){return DB.installments.filter(i=>i.orderId===oid).sort((a,b)=>a.seq-b.seq);}
function orderTotal(o){return lineTotals(o.lines).total;}
function orderReceivable(o){const ins=orderInsts(o.id);return ins.reduce((s,i)=>s+i.amount,0)-ins.reduce((s,i)=>s+instAlloc(i.id),0);}
function totalReceivable(){return DB.orders.filter(o=>o.status!=='canceled').reduce((s,o)=>s+orderReceivable(o),0);}
function refreshInstStatus(inst){const paid=instAlloc(inst.id);
  if(paid>=inst.amount&&inst.amount>0){inst.status='paid';}
  else if(inst.status==='paid'){inst.status=inst.tiId?'billed':'planned';}}
function deliveredQty(orderId){ // itemKey -> 누적 납품수량
  const m={};DB.trans.filter(t=>t.type==='sales'&&t.orderId===orderId).forEach(t=>t.lines.forEach(l=>{const k=(l.itemId||'')+'|'+l.name;m[k]=(m[k]||0)+l.qty;}));return m;}
function receivedQty(poId){const m={};DB.trans.filter(t=>t.type==='purchase'&&t.poId===poId).forEach(t=>t.lines.forEach(l=>{const k=(l.itemId||'')+'|'+l.name;m[k]=(m[k]||0)+l.qty;}));return m;}
function orderMaterialCost(oid){ // 수주 연결 매입(입고) 실적 = 직접 자재비
  return DB.trans.filter(t=>t.type==='purchase'&&DB.pos.some(p=>p.id===t.poId&&p.orderId===oid)).reduce((s,t)=>s+lineTotals(t.lines).supply,0);}
function transInvoiced(tid){return DB.taxInvoices.some(ti=>ti.basis==='trans'&&ti.basisId===tid&&ti.status!=='void');}
function monthRange(ym){return [ym+'-01',ym+'-31'];}
function thisMonth(){return today().slice(0,7);}

/* ---- 상태 배지 ---- */
const ST={quote:{draft:['작성중','b-gray'],sent:['발송','b-blue'],converted:['수주됨','b-green'],lost:['실주','b-red']},
order:{ordered:['수주','b-blue'],producing:['제작중','b-amber'],delivered:['납품완료','b-green'],closed:['종결','b-gray'],canceled:['취소','b-red']},
inst:{planned:['예정','b-gray'],billed:['청구','b-amber'],paid:['수금완료','b-green']},
trans:{open:['작성','b-blue'],invoiced:['계산서발행','b-green']},
po:{ordered:['발주','b-blue'],received:['입고완료','b-green'],closed:['종결','b-gray']},
ti:{draft:['임시','b-gray'],sent:['발행','b-green'],void:['취소분','b-red']},
bank:{unmatched:['미대사','b-amber'],matched:['대사완료','b-green'],partial:['부분대사','b-blue'],etc:['기타처리','b-gray']}};
function badge(kind,st){const d=(ST[kind]||{})[st]||[st,'b-gray'];return '<span class="badge '+d[1]+'">'+d[0]+'</span>';}
function bankStatus(b){const al=bankAllocated(b.id);if(b.status==='etc')return 'etc';if(al<=0)return 'unmatched';return bankRemain(b)>0?'partial':'matched';}

/* ================= 라우터 ================= */
const NAVS=[['#/dash','홈 (대시보드)'],['#/companies','거래처'],['#/items','품목'],['#/sales','영업 (매출)'],['#/purchase','구매 (매입)'],['#/money','자금 / 통장대사'],['#/reports','조회 / 장부']];
function renderNav(){const h=location.hash||'#/dash';document.getElementById('nav').innerHTML=NAVS.map(n=>{
  const on=h.startsWith(n[0])||(n[0]==='#/sales'&&/#\/(quote|order|delivery|invoice)/.test(h))||(n[0]==='#/purchase'&&h.startsWith('#/po'))?' class="on"':'';
  return '<a href="'+n[0]+'"'+on+'>'+n[1]+'</a>';}).join('');}
function route(){renderNav();const h=(location.hash||'#/dash').slice(2);const[p,sub,id]=h.split('/');
  closeModal();const M=document.getElementById('main');
  try{
  switch(p){
    case 'dash':pageDash(M);break;
    case 'companies':sub==='edit'?pageCompanyEdit(M,id):pageCompanies(M);break;
    case 'items':sub==='edit'?pageItemEdit(M,id):pageItems(M);break;
    case 'sales':pageSales(M,'quotes');break;
    case 'quotes':sub==='edit'?pageQuoteEdit(M,id):pageSales(M,'quotes');break;
    case 'orders':sub==='view'?pageOrderView(M,id):sub==='edit'?pageOrderEdit(M,id):pageSales(M,'orders');break;
    case 'deliveries':pageSales(M,'deliveries');break;
    case 'invoices':pageSales(M,'invoices');break;
    case 'purchase':pagePurchase(M,'pos');break;
    case 'po':sub==='edit'?pagePoEdit(M,id):sub==='view'?pagePoView(M,id):pagePurchase(M,'pos');break;
    case 'ptrans':pagePurchase(M,'ptrans');break;
    case 'pinvoices':pagePurchase(M,'pinvoices');break;
    case 'money':pageMoney(M,sub||'status');break;
    case 'reports':pageReports(M,sub||'ledger');break;
    default:pageDash(M);
  }}catch(e){M.innerHTML='<div class="card">오류: '+esc(e.message)+'</div>';console.error(e);}
  window.scrollTo(0,0);}
window.addEventListener('hashchange',route);

/* ================= 모달 ================= */
function openModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('modal').style.display='block';document.getElementById('modal-bg').style.display='block';}
function closeModal(){document.getElementById('modal').style.display='none';document.getElementById('modal-bg').style.display='none';}

/* ================= 관리 기능 ================= */
function exportJson(){const a=document.createElement('a');a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(DB,null,1));a.download='erp_backup_'+today()+'.json';a.click();}
function resetSeed(){if(confirm('현재 데이터를 지우고 샘플 데이터로 초기화할까요?')){DB=seedData();saveDB();route();toast('샘플 데이터로 초기화했습니다');}}
function wipeAll(){if(confirm('모든 데이터를 삭제할까요? (빈 상태로 시작)')){DB=seedData(true);saveDB();route();toast('전체 삭제 완료');}}

/* ================= 샘플 데이터 ================= */

    {id:'q2',no:'Q2026-0002',companyId:'c3',date:'2026-06-20',validUntil:'2026-07-20',status:'sent',soId:null,memo:'2호기 증설 검토분',lines:[L('i2','컨베이어 시스템 CV-10m','벨트식 10m','식',2,12000000)]}];
  base.orders=[

let _pickCb=null;
function pickCompany(cb,type){_pickCb=cb;

function pcRows(list){return '<table><tr><th>상호</th><th>구분</th><th>사업자번호</th><th>대표</th></tr>'+list.map(c=>'<tr style="cursor:pointer" onclick="pcPick(\''+c.id+'\')"><td><b>'+esc(c.name)+'</b></td><td>'+coType(c.type)+'</td><td>'+esc(c.bizno)+'</td><td>'+esc(c.ceo)+'</td></tr>').join('')+'</table>'+(list.length?'':'<div class="mini" style="padding:10px">결과 없음</div>');}
function pcFilter(q,type){const list=DB.companies.filter(c=>c.active&&(type?(c.type===type||c.type==='both'):true)&&(c.name.includes(q)||(c.bizno||'').includes(q)));document.getElementById('pc-list').innerHTML=pcRows(list);}
function pcPick(id){closeModal();if(_pickCb)_pickCb(id);}
function coType(t){return t==='sales'?'매출처':t==='purchase'?'매입처':'겸용';}
function pickItem(cb,kinds){_pickCb=cb;window._pickKinds=kinds||null;

function piBase(q){return DB.items.filter(i=>i.active&&(!window._pickKinds||window._pickKinds.includes(i.kind))&&(i.name.includes(q)||(i.code||'').includes(q)));}
function piRows(list){return '<table><tr><th>코드</th><th>품목명</th><th>규격</th><th>구분</th><th class="r">매출단가</th><th class="r">매입단가</th></tr>'+list.map(i=>'<tr style="cursor:pointer" onclick="pcPick(\''+i.id+'\')"><td>'+esc(i.code)+'</td><td><b>'+esc(i.name)+'</b></td><td>'+esc(i.spec)+'</td><td>'+itemKind(i.kind)+'</td><td class="r num">'+fmt(i.salePrice)+'</td><td class="r num">'+fmt(i.buyPrice)+'</td></tr>').join('')+'</table>';}
function piFilter(q){document.getElementById('pi-list').innerHTML=piRows(piBase(q));}

function dashInstRows(){
  const till=addDays(today(),62);

function saveCompany(id){
  const g=x=>document.getElementById(x).value.trim();
  const name=g('f-name');if(!name){toast('상호를 입력하세요');return;}
  const bizno=g('f-bizno');
  const dup=DB.companies.find(c=>c.bizno&&bizno&&c.bizno===bizno&&c.id!==id);
  if(dup&&!confirm('사업자번호가 "'+dup.name+'"와(과) 중복됩니다. 그래도 저장할까요?'))return;
  const data={name,bizno,ceo:g('f-ceo'),addr:g('f-addr'),tel:g('f-tel'),email:g('f-email'),type:document.getElementById('f-type').value,memo:g('f-memo'),aliases:g('f-alias').split(',').map(s=>s.trim()).filter(Boolean)};
  if(id){const c=byId(DB.companies,id);Object.assign(c,data);touch(c);}else{DB.companies.push(Object.assign({id:uid('c'),active:1},data));}
  saveDB();toast('저장되었습니다');location.hash='#/companies';}
function toggleCompany(id){const c=byId(DB.companies,id);c.active=c.active?0:1;touch(c);saveDB();route();toast(c.active?'활성화됨':'비활성 처리됨 (과거 문서는 유지)');}

function instTable(o,ins,locked){
  return '<table><tr><th style="width:30px">회차</th><th>명칭</th><th>시점</th><th class="r">비율%</th><th class="r">금액(VAT포함)</th><th>예정일</th><th class="r">입금</th><th>상태</th><th></th></tr>'
  +ins.map(inst=>{const ed=!locked&&inst.status==='planned';const alloc=instAlloc(inst.id);
    return '<tr><td class="c">'+inst.seq+'</td>'
    +'<td>'+(ed?'<input style="width:70px" value="'+esc(inst.name)+'" onchange="instChg(\''+inst.id+'\',\'name\',this.value)">':esc(inst.name))+'</td>'
    +'<td>'+(ed?'<input style="width:80px" value="'+esc(inst.trigger||'')+'" onchange="instChg(\''+inst.id+'\',\'trigger\',this.value)">':esc(inst.trigger||''))+'</td>'
    +'<td class="r">'+(ed?'<input class="r" style="width:50px" value="'+(inst.ratio||'')+'" onchange="instRatio(\''+inst.id+'\',this.value)">':(inst.ratio||'-'))+'</td>'
    +'<td class="r">'+(ed?'<input class="r" style="width:110px" value="'+inst.amount+'" onchange="instChg(\''+inst.id+'\',\'amount\',this.value)">':'<span class="num">'+fmt(inst.amount)+'</span>'+(inst.status!=='planned'?' <span class="mini" title="청구/수금 후에는 금액 잠금">🔒</span>':''))+'</td>'
    +'<td>'+(ed?'<input type="date" value="'+(inst.dueDate||'')+'" onchange="instChg(\''+inst.id+'\',\'dueDate\',this.value)">':(inst.dueDate||''))+'</td>'
    +'<td class="r num">'+fmt(alloc)+'</td><td>'+badge('inst',inst.status)+(inst.tiId?' <span class="mini">'+((byId(DB.taxInvoices,inst.tiId)||{}).no||'')+'</span>':'')+'</td>'
    +'<td>'+(inst.status==='planned'&&!locked?'<button class="sm" onclick="issueModal(\'installment\',\''+inst.id+'\')">계산서 발행</button> <button class="sm danger" onclick="instDel(\''+inst.id+'\')">✕</button>':'')+'</td></tr>';}).join('')
  +'</table>';}
function instChg(id,k,v){const inst=byId(DB.installments,id);
  if(inst.status!=='planned'&&(k==='amount')){toast('청구/수금된 회차는 금액을 바꿀 수 없습니다');route();return;}
  inst[k]=k==='amount'?Math.round(+String(v).replace(/,/g,'')||0):v;
  if(k==='amount')inst.ratio=null;
  saveDB();route();}
function instRatio(id,v){const inst=byId(DB.installments,id);const o=byId(DB.orders,inst.orderId);
  inst.ratio=+v||0;inst.amount=Math.round(orderTotal(o)*inst.ratio/100);saveDB();route();}
function instAdd(oid){const o=byId(DB.orders,oid);const ins=orderInsts(oid);
  const names=['계약금','중도금','잔금'];
  DB.installments.push({id:uid('in'),orderId:oid,seq:ins.length+1,name:names[Math.min(ins.length,2)],trigger:'',ratio:null,amount:0,dueDate:addDays(today(),30*(ins.length+1)),status:'planned',tiId:null});
  saveDB();route();}
function instDel(id){const inst=byId(DB.installments,id);
  if(inst.status!=='planned'){toast('청구/수금된 회차는 삭제할 수 없습니다');return;}
  if(!confirm('회차를 삭제할까요?'))return;
  DB.installments=DB.installments.filter(i=>i.id!==id);
  orderInsts(inst.orderId).forEach((x,i)=>x.seq=i+1);saveDB();route();}
function instAutoFill(oid){const o=byId(DB.orders,oid);const ins=orderInsts(oid);
  const tot=orderTotal(o);const fixed=ins.filter(i=>i.status!=='planned'||i.amount>0);
  const open=ins.filter(i=>i.status==='planned'&&i.amount===0);
  if(!open.length){toast('금액이 0원인 예정 회차가 없습니다');return;}
  const remain=tot-fixed.reduce((s,i)=>s+i.amount,0);
  const each=Math.floor(remain/open.length);
  open.forEach((i,idx)=>{i.amount=idx===open.length-1?remain-each*(open.length-1):each;});
  saveDB();route();toast('잔여 '+fmt(remain)+'원을 자동 배분했습니다');}
function instPreset(oid){const o=byId(DB.orders,oid);
  if(orderInsts(oid).length&&!confirm('기존 회차(예정 상태)를 지우고 30/40/30으로 다시 만들까요? 청구·수금된 회차는 유지됩니다.'))return;
  DB.installments=DB.installments.filter(i=>i.orderId!==oid||i.status!=='planned');
  const kept=orderInsts(oid);const tot=orderTotal(o);const keptAmt=kept.reduce((s,i)=>s+i.amount,0);
  const remain=tot-keptAmt;const r=[["계약금","계약 시",30],["중도금","제작 착수",40],["잔금","검수 완료",30]];
  let acc=0;r.forEach((x,i)=>{let amt=i===2?remain-acc:Math.round(remain*x[2]/100);acc+=amt;
    DB.installments.push({id:uid('in'),orderId:oid,seq:kept.length+i+1,name:x[0],trigger:x[1],ratio:x[2],amount:amt,dueDate:addDays(today(),30*(i+1)),status:'planned',tiId:null});});
  saveDB();route();}
function orderStatus(id,st){const o=byId(DB.orders,id);o.status=st;touch(o);saveDB();route();toast('상태가 변경되었습니다');}
function orderClose(id){const o=byId(DB.orders,id);const ins=orderInsts(id);
  const unpaid=ins.filter(i=>i.status!=='paid');
  if(unpaid.length&&!confirm('미수금 회차가 '+unpaid.length+'건 남아 있습니다. 그래도 종결할까요?\n(종결 후에는 수정이 잠깁니다)'))return;
  o.status='closed';touch(o);saveDB();route();}
function orderCancel(id){const o=byId(DB.orders,id);const ins=orderInsts(id);
  const hasAlloc=ins.some(i=>instAlloc(i.id)>0);
  const hasSent=DB.taxInvoices.some(ti=>ti.status==='sent'&&((ti.basis==='order'&&ti.basisId===id)||(ti.basis==='installment'&&ins.some(i=>i.id===ti.basisId))));
  if(hasAlloc){alert('입금 배분이 있는 수주는 바로 취소할 수 없습니다.\n[자금/통장대사]에서 배분을 먼저 취소하세요. (절차 강제)');return;}
  if(hasSent){alert('발행된 세금계산서가 있는 수주는 바로 취소할 수 없습니다.\n[세금계산서]에서 수정(취소)계산서를 먼저 발행하세요. (절차 강제)');return;}
  if(!confirm('수주를 취소할까요? 취소 후에는 잠금 상태가 됩니다.'))return;
  o.status='canceled';touch(o);
  if(o.quoteId){const q=byId(DB.quotes,o.quoteId);if(q){q.status='sent';q.soId=null;touch(q);}}
  saveDB();route();toast('수주가 취소되었습니다. 원본 견적은 다시 활성화되었습니다.');}

function saveOrder(){
  if(!ED.companyId){toast('거래처를 선택하세요');return;}
  if(!ED.lines.length||ED.lines.every(l=>!l.name)){toast('품목 라인을 입력하세요');return;}
  const g=x=>document.getElementById(x).value;
  const data={companyId:ED.companyId,date:g('f-date'),dueDate:g('f-due'),midterm:g('f-mid')==='1',memo:g('f-memo'),lines:ED.lines.filter(l=>l.name)};
  if(ED.id){const o=byId(DB.orders,ED.id);
    const oldTot=orderTotal(o);const newTot=lineTotals(data.lines).total;
    if(oldTot!==newTot){
      const ins=orderInsts(o.id);
      const hasBilled=ins.some(i=>i.status!=='planned');
      if(hasBilled&&!confirm('⚠ 계약액이 '+fmt(oldTot)+' → '+fmt(newTot)+'원으로 바뀝니다.\n이미 청구/수금된 회차가 있습니다. 미청구 회차만 조정 가능합니다. 계속할까요?'))return;
      if(!hasBilled&&o.status!=='ordered'&&!confirm('제작 진행 중 금액 변경입니다. 계속할까요?'))return;}
    Object.assign(o,data);touch(o);
    saveDB();toast('저장되었습니다. 수금계획 합계를 확인하세요.');location.hash='#/orders/view/'+o.id;}
  else{const o=Object.assign({id:uid('so'),no:docNo('SO',data.date),quoteId:null,status:'ordered'},data);
    DB.orders.push(o);saveDB();toast('수주가 등록되었습니다. 수금계획을 설정하세요.');location.hash='#/orders/view/'+o.id;}}

  +'</table></div>';}
function deliveryModal(oid){
  const o=byId(DB.orders,oid);const dq=deliveredQty(oid);
  const rows=o.lines.map((l,i)=>{const k=(l.itemId||'')+'|'+l.name;const rem=l.qty-(dq[k]||0);
    return {i,l,rem};}).filter(x=>x.rem>0);
  if(!rows.length){toast('납품 잔량이 없습니다 (전량 납품 완료)');return;}
  openModal('<h3>납품 생성 — '+o.no+'</h3><div class="mini">수주 라인이 복사됩니다. 수량을 줄이면 부분 납품, 잔량은 자동 추적됩니다.</div>'

  +'<table><tr><th>품목</th><th class="r">수주수량</th><th class="r">기납품</th><th class="r">잔량</th><th class="r">이번 납품수량</th></tr>'
  +rows.map(x=>'<tr><td>'+esc(x.l.name)+'</td><td class="r num">'+fmt(x.l.qty)+'</td><td class="r num">'+fmt(x.l.qty-x.rem)+'</td><td class="r num">'+fmt(x.rem)+'</td><td class="r"><input class="r" style="width:80px" id="dl-q'+x.i+'" value="'+x.rem+'"></td></tr>').join('')
  +'</table><div class="bar" style="margin-top:12px"><button class="pri" onclick="deliveryCreate(\''+oid+'\')">거래명세서 생성</button><button onclick="closeModal()">취소</button></div>');}
function deliveryCreate(oid){
  const o=byId(DB.orders,oid);const dq=deliveredQty(oid);
  const lines=[];let err='';
  o.lines.forEach((l,i)=>{const el=document.getElementById('dl-q'+i);if(!el)return;
    const q=+el.value||0;if(q<=0)return;
    const k=(l.itemId||'')+'|'+l.name;const rem=l.qty-(dq[k]||0);
    if(q>rem){err='"'+l.name+'" 납품수량('+q+')이 잔량('+rem+')을 초과합니다';return;}
    const it=l.itemId?byId(DB.items,l.itemId):null;
    lines.push(calcLine({itemId:l.itemId,name:l.name,spec:l.spec,unit:l.unit,qty:q,price:l.price},it&&it.tax==='exempt'));});
  if(err){toast('⚠ '+err);return;}
  if(!lines.length){toast('납품 수량을 입력하세요');return;}
  const date=document.getElementById('dl-date').value;
  const d={id:uid('ts'),no:docNo('DL',date),type:'sales',orderId:oid,companyId:o.companyId,date,status:'open',lines};
  DB.trans.push(d);
  const dq2=deliveredQty(oid);
  const full=o.lines.every(l=>{const k=(l.itemId||'')+'|'+l.name;return (dq2[k]||0)>=l.qty;});
  if(full){o.status='delivered';touch(o);}
  saveDB();closeModal();route();

  +'</table><div class="mini" style="margin-top:6px">발행(전송) 후에는 직접 수정·삭제가 불가능하며 수정세금계산서(6가지 사유)로만 정정합니다.</div></div>';}
function basisLink(ti){

const MODIFY_REASONS=[
  ['기재사항 착오정정','당초분 취소(-) + 정확한 내용으로 재발행(+) 2장 · 작성일자는 당초일 소급',2],

function modifyModal(tiId){const ti=byId(DB.taxInvoices,tiId);
  openModal('<h3>수정세금계산서 발행 — 당초분 '+ti.no+'</h3>'
  +'<div class="mini">당초: '+ti.date+' / 공급가액 '+fmt(ti.supply)+' / 세액 '+fmt(ti.vat)+' — 홈택스 6가지 사유 체계</div>'
  +'<div class="frm" style="margin:10px 0"><div class="full"><label>수정 사유</label><select id="mr-reason" onchange="mrHint()">'

  +'<div class="full"><div class="warnbox" id="mr-hint">'+MODIFY_REASONS[0][1]+'</div></div>'
  +'<div><label>작성일자</label><input type="date" id="mr-date" value="'+ti.date+'"></div>'
  +'<div id="mr-amt-wrap" style="display:none"><label>변동/환입 공급가액 (음수=감액)</label><input class="r" id="mr-amt" value="0"></div>'
  +'</div><div class="bar"><button class="pri" onclick="modifyDo(\''+tiId+'\')">수정계산서 발행</button><button onclick="closeModal()">취소</button></div>');}
function mrHint(){const i=+document.getElementById('mr-reason').value;
  document.getElementById('mr-hint').textContent=MODIFY_REASONS[i][1];
  document.getElementById('mr-amt-wrap').style.display=(i===2||i===4)?'block':'none';
  const ti=null;
  document.getElementById('mr-date').value=(i===0||i===1||i===5)?document.getElementById('mr-date').value:today();}
function modifyDo(tiId){
  const ti=byId(DB.taxInvoices,tiId);
  const ri=+document.getElementById('mr-reason').value;
  const reason=MODIFY_REASONS[ri][0];
  const date=document.getElementById('mr-date').value;
  let negSupply=-ti.supply,negVat=-ti.vat;
  if(ri===2||ri===4){const amt=Math.round(+String(document.getElementById('mr-amt').value).replace(/,/g,'')||0);
    if(!amt){toast('변동/환입 금액을 입력하세요');return;}
    negSupply=ri===4?-Math.abs(amt):amt;negVat=Math.round(negSupply*0.1);}
  const neg={id:uid('ti'),no:docNo(ti.type==='sales'?'TI':'PTI',date),type:ti.type,companyId:ti.companyId,date,basis:ti.basis,basisId:ti.basisId,supply:negSupply,vat:negVat,status:'sent',memo:'수정('+reason+') — 당초 '+ti.no,originalId:ti.id,modifyReason:reason};
  DB.taxInvoices.push(neg);
  if(MODIFY_REASONS[ri][2]===2){ // 부(-) + 정(+) 2장
    const pos={id:uid('ti'),no:docNo(ti.type==='sales'?'TI':'PTI',date),type:ti.type,companyId:ti.companyId,date,basis:ti.basis,basisId:ti.basisId,supply:ti.supply,vat:ti.vat,status:'draft',memo:'수정 재발행분(내용 수정 후 발행) — 당초 '+ti.no,originalId:ti.id,modifyReason:reason};
    DB.taxInvoices.push(pos);}
  recalcBasisBilling(ti);
  saveDB();closeModal();route();
  toast('수정계산서 발행 완료'+(MODIFY_REASONS[ri][2]===2?' · 재발행분은 임시저장으로 생성 — 내용 확인 후 발행하세요':''));}
function recalcBasisBilling(ti){
  const sum=DB.taxInvoices.filter(x=>x.basis===ti.basis&&x.basisId===ti.basisId&&x.status==='sent').reduce((s,x)=>s+x.supply+x.vat,0);
  if(ti.basis==='installment'){const inst=byId(DB.installments,ti.basisId);
    if(inst&&sum<=0&&inst.status==='billed'){inst.status='planned';inst.tiId=null;}}
  if(ti.basis==='trans'){const d=byId(DB.trans,ti.basisId);
    if(d&&sum<=0&&d.status==='invoiced')d.status='open';}}

    +'<td class="c">'+(r.overdue?'<span class="badge b-red">'+r.overdue+'건</span>':'-')+'</td><td class="c">'+(r.age?r.age+'개월':'-')+'</td>'

function bankEtc(id){const b=byId(DB.bank,id);const note=prompt('기타 처리 사유 (예: 급여, 경비, 이자, 대표자 가수금)','경비');

function normName(s){return String(s||'').replace(/[\s\(\)（）주식회사㈜\(주\)]/g,'').toLowerCase();}
function nameScore(desc,c){const d=normName(desc);if(!d)return 0;
  const cands=[c.name].concat(c.aliases||[]);
  for(const n of cands){const nn=normName(n);if(!nn)continue;
    if(d.includes(nn)||nn.includes(d))return 30;
    if(nn.length>=2&&d.includes(nn.slice(0,2)))return 15;}
  return 0;}
function reconModal(bid){
  const b=byId(DB.bank,bid);const rem=bankRemain(b);
  let cands=[];
  if(b.amount>0){
    DB.installments.forEach(i=>{const o=byId(DB.orders,i.orderId);
      if(!o||o.status==='canceled'||i.status==='paid')return;
      const irem=instRemain(i);if(irem<=0)return;
      const c=co(o.companyId);let sc=0;
      sc+=irem===rem?45:(rem<=irem?25:10);
      sc+=nameScore(b.desc,c);
      if(i.dueDate){const dd=Math.abs((new Date(b.date)-new Date(i.dueDate))/86400000);sc+=dd<=3?20:dd<=14?12:dd<=31?6:0;}
      cands.push({type:'installment',id:i.id,sc,title:o.no+' '+i.seq+'회 '+i.name+' · '+c.name,due:i.dueDate,remain:irem});});
  }else{
    DB.taxInvoices.filter(t=>t.type==='purchase'&&t.status==='sent').forEach(ti=>{
      const unpaid=ti.supply+ti.vat-ptransAlloc(ti.basisId);if(unpaid<=0)return;
      const c=co(ti.companyId);let sc=0;
      sc+=unpaid===rem?45:(rem<=unpaid?25:10);
      sc+=nameScore(b.desc,c);
      const dd=Math.abs((new Date(b.date)-new Date(ti.date))/86400000);sc+=dd<=7?15:dd<=31?8:0;
      cands.push({type:'purchaseTrans',id:ti.basisId,sc,title:'매입 '+ti.no+' · '+c.name,due:ti.date,remain:unpaid});});}
  cands.sort((a,b2)=>b2.sc-a.sc);cands=cands.slice(0,8);
  window._reconBid=bid;window._reconCands=cands;
  openModal('<h3>'+(b.amount>0?'입금':'출금')+' 배분 — '+b.date+' '+esc(b.desc)+' <span class="num" style="color:'+(b.amount>0?'var(--pri)':'var(--bad)')+'">'+fmt(Math.abs(b.amount))+'원</span></h3>'
  +'<div class="mini">배분 가능 잔액: <b class="num">'+fmt(rem)+'원</b> · 자동 추천순 정렬 (금액일치 &gt; 이름유사 &gt; 예정일근접). 여러 건에 나눠 배분(분할)할 수 있습니다.</div>'
  +(cands.length?'<table style="margin-top:8px"><tr><th>추천</th><th>대상</th><th>예정/작성일</th><th class="r">미수/미지급 잔액</th><th class="r">배분액 입력</th></tr>'
  +cands.map((cd,i)=>'<tr'+(i===0&&cd.sc>=60?' style="background:#eff6ff"':'')+'><td>'+(cd.sc>=60?'<span class="badge b-blue">추천 '+cd.sc+'</span>':'<span class="mini">'+cd.sc+'점</span>')+'</td><td>'+esc(cd.title)+'</td><td>'+(cd.due||'')+'</td><td class="r num">'+fmt(cd.remain)+'</td>'
    +'<td class="r"><input class="r" style="width:110px" id="rc-'+i+'" value="'+(i===0&&cd.sc>=60?Math.min(cd.remain,rem):0)+'"></td></tr>').join('')+'</table>'
    :'<div class="warnbox">매칭 후보가 없습니다. '+(b.amount>0?'수금계획이 설정된 수주가 있는지':'미지급 매입계산서가 있는지')+' 확인하거나 [기타]로 처리하세요.</div>')
  +'<div class="bar" style="margin-top:10px"><label class="mini"><input type="checkbox" id="rc-fee"> 배분 후 남는 소액 잔여를 수수료/잡이익으로 털기 (송금수수료 차액 등)</label></div>'
  +'<div class="bar" style="margin-top:8px"><button class="pri" onclick="reconDo()">배분 확정</button><button onclick="closeModal()">취소</button></div>');}
function reconDo(){
  const bid=window._reconBid;const b=byId(DB.bank,bid);
  const cands=window._reconCands;let rem=bankRemain(b);
  let total=0;const picks=[];
  cands.forEach((cd,i)=>{const v=Math.round(+String((document.getElementById('rc-'+i)||{}).value||'0').replace(/,/g,''))||0;
    if(v>0)picks.push({cd,v});total+=v>0?v:0;});
  if(!picks.length){toast('배분액을 입력하세요');return;}
  if(total>rem){toast('⚠ 배분 합계('+fmt(total)+')가 잔여('+fmt(rem)+')를 초과합니다');return;}
  for(const p of picks){
    if(p.v>p.cd.remain){toast('⚠ "'+p.cd.title+'" 배분액이 잔액을 초과합니다');return;}}
  picks.forEach(p=>{
    DB.allocs.push({id:uid('a'),bankId:bid,targetType:p.cd.type,targetId:p.cd.id,amount:p.v,fee:0,date:b.date});
    if(p.cd.type==='installment'){const inst=byId(DB.installments,p.cd.id);refreshInstStatus(inst);
      const o=byId(DB.orders,inst.orderId);const c=co(o.companyId);
      if(nameScore(b.desc,c)===0&&b.desc){c.aliases=c.aliases||[];if(!c.aliases.includes(b.desc.trim())){c.aliases.push(b.desc.trim());toast('입금자명 "'+b.desc+'"을(를) '+c.name+' 별칭으로 학습했습니다');}}}});
  const left=bankRemain(b);
  if(left>0&&document.getElementById('rc-fee').checked){
    DB.allocs.push({id:uid('a'),bankId:bid,targetType:'fee',targetId:null,amount:left,fee:0,date:b.date});}
  saveDB();closeModal();route();toast('배분 완료 (부분입금·분할배분 자동 반영)');}
function allocCancel(id){const a=byId(DB.allocs,id);
  if(!confirm('이 배분을 취소할까요? (통장 원본은 그대로, 배분만 취소)'))return;
  DB.allocs=DB.allocs.filter(x=>x.id!==id);
  if(a.targetType==='installment'){const inst=byId(DB.installments,a.targetId);if(inst)refreshInstStatus(inst);}
  saveDB();route();toast('배분이 취소되었습니다');}
function csvModal(){
  openModal('<h3>통장 거래내역 가져오기</h3>'
  +'<div class="mini">형식: <span class="kbd">날짜,적요,입금액,출금액</span> (은행 CSV에서 해당 열 복사). 첫 줄이 제목이면 자동 건너뜀. 같은 내역 재업로드는 중복 감지로 자동 제외됩니다.</div>'
  +'<div style="margin:10px 0"><input type="file" accept=".csv,.txt" onchange="csvFile(this)"></div>'
  +'<textarea id="csv-text" rows="8" style="width:100%" placeholder="2026-07-02,(주)대한정밀,15510000,0&#10;2026-07-03,전기요금,0,182300"></textarea>'
  +'<div class="bar" style="margin-top:10px"><button class="pri" onclick="csvImport()">가져오기</button><button onclick="closeModal()">취소</button></div>');}
function csvFile(inp){const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{document.getElementById('csv-text').value=e.target.result;};r.readAsText(f,'utf-8');}
function csvImport(){
  const txt=document.getElementById('csv-text').value.trim();
  if(!txt){toast('내용이 없습니다');return;}
  let ok=0,dup=0,bad=0;
  txt.split(/\r?\n/).forEach(line=>{
    if(!line.trim())return;
    const cells=line.split(',').map(s=>s.trim().replace(/^"|"$/g,''));
    if(cells.length<3){bad++;return;}
    let date=cells[0].replace(/[.\/]/g,'-');
    if(!/^\d{4}-\d{1,2}-\d{1,2}/.test(date)){bad++;return;}
    date=date.slice(0,10);
    const desc=cells[1];
    const inAmt=Math.round(+String(cells[2]||'0').replace(/[^0-9.-]/g,''))||0;
    const outAmt=Math.round(+String(cells[3]||'0').replace(/[^0-9.-]/g,''))||0;
    const amount=inAmt>0?inAmt:-outAmt;
    if(!amount){bad++;return;}
    const hash=date+'|'+desc+'|'+amount;
    if(DB.bank.some(b=>b.hash===hash)){dup++;return;}
    DB.bank.push({id:uid('b'),date,desc,amount,balance:null,hash,status:'unmatched',etcNote:''});ok++;});
  saveDB();closeModal();route();
  toast('가져오기: '+ok+'건 추가 · 중복 '+dup+'건 제외 · 형식오류 '+bad+'건');}

function pageReports(M,sub){
  const [tab,qs]=String(sub||'ledger').split('?');

  const t=[['ledger','거래처 원장'],['profit','수주별 손익'],['plan','수금계획 현황'],['history','매출·매입 이력'],['tis','세금계산서 목록'],['payable','미지급 현황']];
  let body='';
  if(tab==='ledger')body=repLedger(params);
  else if(tab==='profit')body=repProfit();
  else if(tab==='plan')body=repPlan();
  else if(tab==='history')body=repHistory();
  else if(tab==='tis')body=repTis();
  else body=repPayable();
  M.innerHTML='<h2>조회 / 장부</h2><div class="crumb">읽기 전용 · 각 행에서 원본 문서로 드릴다운됩니다</div>'

function repLedger(params){
  const cid=params.c||window._ledgerC||(DB.companies.find(c=>c.type!=='purchase')||{}).id;
  window._ledgerC=cid;
  const from=window._ledgerFrom||today().slice(0,4)+'-01-01';
  const to=window._ledgerTo||today();
  const sel='<div class="bar"><select onchange="window._ledgerC=this.value;route()">'+DB.companies.map(c=>'<option value="'+c.id+'"'+(c.id===cid?' selected':'')+'>'+esc(c.name)+'</option>').join('')+'</select>'
  +'<input type="date" value="'+from+'" onchange="window._ledgerFrom=this.value;route()"> ~ <input type="date" value="'+to+'" onchange="window._ledgerTo=this.value;route()"></div>';
  if(!cid)return '<div class="card">'+sel+'거래처가 없습니다</div>';
  const c=co(cid);
  // 차변 = 매출 세금계산서(발행), 대변 = 입금 배분
  const debits=DB.taxInvoices.filter(t=>t.type==='sales'&&t.status==='sent'&&t.companyId===cid).map(t=>({date:t.date,desc:'세금계산서 '+t.no+(t.modifyReason?' (수정:'+t.modifyReason+')':'')+' — '+basisPlain(t),dr:t.supply+t.vat,cr:0,ti:t}));
  const credits=DB.allocs.filter(a=>{if(a.targetType!=='installment')return false;
    const i=byId(DB.installments,a.targetId);if(!i)return false;
    const o=byId(DB.orders,i.orderId);return o&&o.companyId===cid;}).map(a=>{
    const b=byId(DB.bank,a.bankId);const i=byId(DB.installments,a.targetId);const o=byId(DB.orders,i.orderId);
    return {date:a.date,desc:'입금 ('+esc(b?b.desc:'')+') → '+o.no+' '+i.seq+'회 '+i.name,dr:0,cr:a.amount};});
  const all=debits.concat(credits).sort((a,b)=>a.date<b.date?-1:1);
  const before=all.filter(r=>r.date<from);
  const rows=all.filter(r=>r.date>=from&&r.date<=to);
  let bal=before.reduce((s,r)=>s+r.dr-r.cr,0);
  const openBal=bal;
  let html='<div class="card">'+sel
  +'<h3 style="margin-top:4px">'+esc(c.name)+' 원장 <span class="mini">(차변=계산서 발행 / 대변=입금 배분 / 잔액=받을 돈)</span></h3>'
  +'<table><tr><th>일자</th><th>적요</th><th class="r">차변(매출)</th><th class="r">대변(입금)</th><th class="r">잔액</th></tr>'
  +'<tr style="background:#f8fafc"><td>'+from+'</td><td><b>전기 이월</b></td><td></td><td></td><td class="r num"><b>'+fmt(openBal)+'</b></td></tr>'
  +rows.map(r=>{bal+=r.dr-r.cr;
    return '<tr><td>'+r.date+'</td><td>'+r.desc+'</td><td class="r num">'+(r.dr?fmt(r.dr):'')+'</td><td class="r num">'+(r.cr?fmt(r.cr):'')+'</td><td class="r num">'+fmt(bal)+'</td></tr>';}).join('')
  +'<tr style="background:#f8fafc"><td colspan="2"><b>기말 잔액</b></td><td class="r num"><b>'+fmt(rows.reduce((s,r)=>s+r.dr,0))+'</b></td><td class="r num"><b>'+fmt(rows.reduce((s,r)=>s+r.cr,0))+'</b></td><td class="r num"><b style="color:var(--bad)">'+fmt(bal)+'</b></td></tr></table>'
  +'<div class="mini" style="margin-top:6px">참고: 미수금 관리는 계산서 기준이 아니라 [자금/통장대사 &gt; 수금 현황]의 수금계획(회차) 기준이 정확합니다. 원장은 세무·대조용입니다.</div></div>';
  return html;}
function basisPlain(ti){
  if(ti.basis==='order'){const o=byId(DB.orders,ti.basisId);return o?'수주 '+o.no:'';}
  if(ti.basis==='trans'){const d=byId(DB.trans,ti.basisId);return d?'납품 '+d.no:'';}
  if(ti.basis==='installment'){const i=byId(DB.installments,ti.basisId);if(!i)return '';
    const o=byId(DB.orders,i.orderId);return (o?o.no:'')+' '+i.seq+'회 '+i.name;}
  return '';}
function repProfit(){
  const rows=DB.orders.filter(o=>o.status!=='canceled').map(o=>{

  +'<td class="r"><span class="badge '+(r.margin<15?'b-red':r.margin<30?'b-amber':'b-green')+'">'+r.margin+'%</span></td><td class="r num">'+fmt(r.paid)+'</td><td class="r num"'+(r.recv>0?' style="color:var(--bad)"':'')+'>'+fmt(r.recv)+'</td></tr>').join('')
