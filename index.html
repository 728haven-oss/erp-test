  +'<div><label>세액</label><input class="r" id="ti-vat" value="'+vat+'"></div>'
  +'<div class="full"><label>비고</label><input id="ti-memo" value=""></div></div>'
  +'<div class="mini">거래처: '+esc(co(companyId).name)+' · 지금은 내부기록 발행입니다. (추후 홈택스 전송 연동 자리: send_to_hometax)</div>'
  +'<div class="bar" style="margin-top:12px"><button class="pri" onclick="issueDo(\''+basis+'\',\''+basisId+'\',\''+companyId+'\',\'sent\')">발행 (전송)</button>'
  +'<button onclick="issueDo(\''+basis+'\',\''+basisId+'\',\''+companyId+'\',\'draft\')">임시저장</button><button onclick="closeModal()">취소</button></div>');}
function issueDo(basis,basisId,companyId,status){
  const g=x=>document.getElementById(x).value;
  if(!lockGuard(g('ti-date'),'세금계산서 발행'))return;
  const supply=Math.round(+String(g('ti-supply')).replace(/,/g,'')||0);
  const vat=Math.round(+String(g('ti-vat')).replace(/,/g,'')||0);
  if(!supply){toast('공급가액을 입력하세요');return;}
  const ti={id:uid('ti'),no:docNo('TI',g('ti-date')),type:'sales',companyId,date:g('ti-date'),basis,basisId,supply,vat,status,memo:g('ti-memo'),originalId:null,modifyReason:null};
  DB.taxInvoices.push(ti);
  if(status==='sent')applyInvoiceEffect(ti);
  saveDB();closeModal();route();toast('세금계산서 '+ti.no+' '+(status==='sent'?'발행 완료':'임시저장')+' 되었습니다');}
function applyInvoiceEffect(ti){
  if(ti.basis==='installment'){const inst=byId(DB.installments,ti.basisId);
    if(inst){inst.tiId=ti.id;if(inst.status==='planned')inst.status='billed';}}
  if(ti.basis==='trans'){const d=byId(DB.trans,ti.basisId);if(d)d.status='invoiced';}}
function invoicesList(type){
  const f=_stFilter.invoices;
  const list=DB.taxInvoices.filter(t=>t.type===type&&(!f||t.status===f)).filter(x=>fltHit('ti_'+type,x,null)).sort((a,b)=>a.no<b.no?1:-1);
  const all=DB.taxInvoices.filter(t=>t.type===type);
  const cnt=s=>all.filter(t=>t.status===s).length;
  return '<div class="card"><div class="bar">'
  +['','draft','sent'].map(s=>'<a class="lnk" style="'+(f===s?'font-weight:bold':'')+'" onclick="_stFilter.invoices=\''+s+'\';route()">'+(s?ST.ti[s][0]+' '+cnt(s):'전체 '+all.length)+'</a>').join(' · ')
  +'<div class="sp"></div><span class="mini">'+(type==='sales'?'발행은 수주/납품/회차 화면의 [계산서 발행] 버튼으로 (발행근거 3택1)':'매입 계산서는 입고 내역에서 [계산서 수취]로 등록')+'</span></div>'+fltBar('ti_'+type,{coType:type==='sales'?'sales':'purchase',brand:false})
  +'<table><tr><th>번호</th><th>작성일</th><th>거래처</th><th>발행 근거</th><th class="r">공급가액</th><th class="r">세액</th><th class="r">합계</th><th>상태</th><th></th></tr>'
  +list.map(ti=>{const neg=ti.supply<0;
    return '<tr'+(neg?' style="color:var(--bad)"':'')+'><td>'+ti.no+(ti.originalId?' <span class="badge b-red" title="수정계산서">수정</span>':'')+'</td><td>'+ti.date+'</td><td>'+esc(co(ti.companyId).name)+'</td><td>'+basisLink(ti)+'</td><td class="r num">'+fmt(ti.supply)+'</td><td class="r num">'+fmt(ti.vat)+'</td><td class="r num"><b>'+fmt(ti.supply+ti.vat)+'</b></td><td>'+badge('ti',ti.status)+(ti.modifyReason?'<div class="mini">'+esc(ti.modifyReason)+'</div>':'')+'</td>'
    +'<td><button class="sm" onclick="tiPrint(\''+ti.id+'\')">양식</button> '+(ti.status==='draft'?'<button class="sm pri" onclick="tiSend(\''+ti.id+'\')">발행</button> <button class="sm danger" onclick="tiDel(\''+ti.id+'\')">삭제</button>':(ti.supply>0?'<button class="sm" onclick="emailModal(\'ti\',\''+ti.id+'\')">메일</button> <button class="sm" onclick="modifyModal(\''+ti.id+'\')">수정계산서</button>':''))+'</td></tr>';}).join('')
  +'</table><div class="mini" style="margin-top:6px">발행(전송) 후에는 직접 수정·삭제가 불가능하며 수정세금계산서(6가지 사유)로만 정정합니다.</div></div>';}
function basisLink(ti){
  if(ti.basis==='order'){const o=byId(DB.orders,ti.basisId);return o?'수주 <a class="lnk" href="#/orders/view/'+o.id+'">'+o.no+'</a>':'수주';}
  if(ti.basis==='trans'){const d=byId(DB.trans,ti.basisId);return d?(d.type==='sales'?'납품 ':'입고 ')+'<a class="lnk" onclick="dlView(\''+d.id+'\')">'+d.no+'</a>':'명세서';}
  if(ti.basis==='installment'){const inst=byId(DB.installments,ti.basisId);if(!inst)return '회차';
    const o=byId(DB.orders,inst.orderId);return '회차 <a class="lnk" href="#/orders/view/'+o.id+'">'+o.no+' '+inst.seq+'회('+esc(inst.name)+')</a>';}
  return '-';}
function tiSend(id){const ti=byId(DB.taxInvoices,id);if(!lockGuard(ti.date,'계산서 발행'))return;ti.status='sent';applyInvoiceEffect(ti);logAudit('세금계산서 발행',ti.no);saveDB();route();toast(ti.no+' 발행 완료');}
function tiDel(id){const ti=byId(DB.taxInvoices,id);
  if(ti.status!=='draft'){toast('발행된 계산서는 삭제 불가 — 수정계산서로 정정하세요');return;}
  if(!confirm('임시저장 계산서를 삭제할까요?'))return;
  DB.taxInvoices=DB.taxInvoices.filter(t=>t.id!==id);saveDB();route();}
const MODIFY_REASONS=[
  ['기재사항 착오정정','당초분 취소(-) + 정확한 내용으로 재발행(+) 2장 · 작성일자는 당초일 소급',2],
  ['착오에 의한 이중발급','당초분 취소(-) 1장만 · 작성일자 당초일 소급',1],
  ['공급가액 변동','증감분만 (+/-) 1장 · 작성일자 = 변동 발생일',3],
  ['계약의 해제','전액 취소(-) 1장 · 작성일자 = 계약 해제일',1],
  ['환입 (반품)','반품분만 (-) 1장 · 작성일자 = 환입일',3],
  ['내국신용장 사후개설','당초분 취소(-) + 영세율(+) 2장 · 작성일자 당초일 소급',2]];
function modifyModal(tiId){const ti=byId(DB.taxInvoices,tiId);
  openModal('<h3>수정세금계산서 발행 — 당초분 '+ti.no+'</h3>'
  +'<div class="mini">당초: '+ti.date+' / 공급가액 '+fmt(ti.supply)+' / 세액 '+fmt(ti.vat)+' — 홈택스 6가지 사유 체계</div>'
  +'<div class="frm" style="margin:10px 0"><div class="full"><label>수정 사유</label><select id="mr-reason" onchange="mrHint()">'
  +MODIFY_REASONS.map((r,i)=>'<option value="'+i+'">'+r[0]+'</option>').join('')+'</select></div>'
  +'<div class="full"><div class="warnbox" id="mr-hint">'+MODIFY_REASONS[0][1]+'</div></div>'
  +'<div><label>작성일자</label><input type="date" id="mr-date" value="'+ti.date+'"></div>'
  +'<div id="mr-amt-wrap" style="display:none"><label>변동/환입 공급가액 (음수=감액)</label><input class="r" id="mr-amt" value="0"></div>'
  +'</div><div class="bar"><button class="pri" onclick="modifyDo(\''+tiId+'\')">수정계산서 발행</button><button onclick="closeModal()">취소</button></div>');}
function mrHint(){const i=+document.getElementById('mr-reason').value;
  document.getElementById('mr-hint').textContent=MODIFY_REASONS[i][1];
  document.getElementById('mr-amt-wrap').style.display=(i===2||i===4)?'block':'none';
  const ti=null;
  document.getElementById('mr-date').value=(i===0||i===1||i===5)?document.getElementById('mr-date').value:today();}
function modifyDo(tiId){
  const ti=byId(DB.taxInvoices,tiId);
  const ri=+document.getElementById('mr-reason').value;
  const reason=MODIFY_REASONS[ri][0];
  const date=document.getElementById('mr-date').value;
  let negSupply=-ti.supply,negVat=-ti.vat;
  if(ri===2||ri===4){const amt=Math.round(+String(document.getElementById('mr-amt').value).replace(/,/g,'')||0);
    if(!amt){toast('변동/환입 금액을 입력하세요');return;}
    negSupply=ri===4?-Math.abs(amt):amt;negVat=Math.round(negSupply*0.1);}
  if(!lockGuard(date,'수정계산서'))return;
  logAudit('수정세금계산서 발행('+reason+')',ti.no);
  const neg={id:uid('ti'),no:docNo(ti.type==='sales'?'TI':'PTI',date),type:ti.type,companyId:ti.companyId,date,basis:ti.basis,basisId:ti.basisId,supply:negSupply,vat:negVat,status:'sent',memo:'수정('+reason+') — 당초 '+ti.no,originalId:ti.id,modifyReason:reason};
  DB.taxInvoices.push(neg);
  if(MODIFY_REASONS[ri][2]===2){ // 부(-) + 정(+) 2장
    const pos={id:uid('ti'),no:docNo(ti.type==='sales'?'TI':'PTI',date),type:ti.type,companyId:ti.companyId,date,basis:ti.basis,basisId:ti.basisId,supply:ti.supply,vat:ti.vat,status:'draft',memo:'수정 재발행분(내용 수정 후 발행) — 당초 '+ti.no,originalId:ti.id,modifyReason:reason};
    DB.taxInvoices.push(pos);}
  recalcBasisBilling(ti);
  saveDB();closeModal();route();
  toast('수정계산서 발행 완료'+(MODIFY_REASONS[ri][2]===2?' · 재발행분은 임시저장으로 생성 — 내용 확인 후 발행하세요':''));}
function recalcBasisBilling(ti){
  const sum=DB.taxInvoices.filter(x=>x.basis===ti.basis&&x.basisId===ti.basisId&&x.status==='sent').reduce((s,x)=>s+x.supply+x.vat,0);
  if(ti.basis==='installment'){const inst=byId(DB.installments,ti.basisId);
    if(inst&&sum<=0&&inst.status==='billed'){inst.status='planned';inst.tiId=null;}}
  if(ti.basis==='trans'){const d=byId(DB.trans,ti.basisId);
    if(d&&sum<=0&&d.status==='invoiced')d.status='open';}}

function receiveDo(pid){
  const p=byId(DB.pos,pid);const rq=receivedQty(pid);
  if(!poApvOk(p)){toast('⚠ 결재 승인 전에는 입고 처리할 수 없습니다');return;}
  if(!lockGuard(document.getElementById('gr-date').value,'입고'))return;
  const lines=[];let err='';
  p.lines.forEach((l,i)=>{const el=document.getElementById('gr-q'+i);if(!el)return;
    const q=+el.value||0;if(q<=0)return;
    const k=(l.itemId||'')+'|'+l.name;const rem=l.qty-(rq[k]||0);
    if(q>rem){err='"'+l.name+'" 입고수량이 잔량을 초과합니다';return;}
    const it=l.itemId?byId(DB.items,l.itemId):null;
    lines.push(calcLine({itemId:l.itemId,name:l.name,spec:l.spec,unit:l.unit,qty:q,price:l.price,dcRate:l.dcRate||0},it&&it.tax==='exempt'));});
  if(err){toast('⚠ '+err);return;}
  if(!lines.length){toast('입고 수량을 입력하세요');return;}
  const date=document.getElementById('gr-date').value;
  const g={id:uid('tp'),no:docNo('GR',date),type:'purchase',poId:pid,companyId:p.companyId,date,status:'open',lines};
  DB.trans.push(g);
  const rq2=receivedQty(pid);
  const full=p.lines.every(l=>{const k=(l.itemId||'')+'|'+l.name;return (rq2[k]||0)>=l.qty;});
  if(full){p.status='received';touch(p);}
  saveDB();closeModal();route();toast('입고 '+g.no+' 처리'+(full?' · 전량 입고 완료':' (부분 입고)')+(p.orderId?' · 연결 수주 자재비에 반영됨':''));}

function normName(s){return String(s||'').replace(/[\s\(\)（）주식회사㈜\(주\)]/g,'').toLowerCase();}
function nameScore(desc,c){const d=normName(desc);if(!d)return 0;
  const cands=[c.name].concat(c.aliases||[]);
  for(const n of cands){const nn=normName(n);if(!nn)continue;
    if(d.includes(nn)||nn.includes(d))return 30;
    if(nn.length>=2&&d.includes(nn.slice(0,2)))return 15;}
  return 0;}
function reconModal(bid){

      if(i.dueDate){const dd=Math.abs((new Date(b.date)-new Date(i.dueDate))/86400000);sc+=dd<=3?20:dd<=14?12:dd<=31?6:0;}
      cands.push({type:'installment',id:i.id,sc,title:o.no+' '+i.seq+'회 '+i.name+' · '+c.name,due:i.dueDate,remain:irem});});
  }else{
    DB.taxInvoices.filter(t=>t.type==='purchase'&&t.status==='sent').forEach(ti=>{

  +(cands.length?'<table style="margin-top:8px"><tr><th>추천</th><th>대상</th><th>예정/작성일</th><th class="r">미수/미지급 잔액</th><th class="r">배분액 입력</th></tr>'
  +cands.map((cd,i)=>'<tr'+(i===0&&cd.sc>=60?' style="background:#eff6ff"':'')+'><td>'+(cd.sc>=60?'<span class="badge b-blue">추천 '+cd.sc+'</span>':'<span class="mini">'+cd.sc+'점</span>')+'</td><td>'+esc(cd.title)+'</td><td>'+(cd.due||'')+'</td><td class="r num">'+fmt(cd.remain)+'</td>'
    +'<td class="r"><input class="r" style="width:110px" id="rc-'+i+'" value="'+(i===0&&cd.sc>=60?Math.min(cd.remain,rem):0)+'"></td></tr>').join('')+'</table>'
    :'<div class="warnbox">매칭 후보가 없습니다. '+(b.amount>0?'수금계획이 설정된 수주가 있는지':'미지급 매입계산서가 있는지')+' 확인하거나 [기타]로 처리하세요.</div>')
  +'<div class="bar" style="margin-top:10px"><label class="mini"><input type="checkbox" id="rc-fee"> 배분 후 남는 소액 잔여를 수수료/잡이익으로 털기 (송금수수료 차액 등)</label></div>'
  +'<div class="bar" style="margin-top:8px"><button class="pri" onclick="reconDo()">배분 확정</button><button onclick="closeModal()">취소</button></div>');}
function reconDo(){
  const bid=window._reconBid;const b=byId(DB.bank,bid);
  const cands=window._reconCands;let rem=bankRemain(b);
  let total=0;const picks=[];
  cands.forEach((cd,i)=>{const v=Math.round(+String((document.getElementById('rc-'+i)||{}).value||'0').replace(/,/g,''))||0;
    if(v>0)picks.push({cd,v});total+=v>0?v:0;});
  if(!picks.length){toast('배분액을 입력하세요');return;}
  if(total>rem){toast('⚠ 배분 합계('+fmt(total)+')가 잔여('+fmt(rem)+')를 초과합니다');return;}
  for(const p of picks){
    if(p.v>p.cd.remain){toast('⚠ "'+p.cd.title+'" 배분액이 잔액을 초과합니다');return;}}
  if(!lockGuard(b.date,'통장 배분'))return;
  logAudit('통장 배분',b.date+' '+b.desc);
  picks.forEach(p=>{
    DB.allocs.push({id:uid('a'),bankId:bid,targetType:p.cd.type,targetId:p.cd.id,amount:p.v,fee:0,date:b.date});
    if(p.cd.type==='installment'){const inst=byId(DB.installments,p.cd.id);refreshInstStatus(inst);
      const o=byId(DB.orders,inst.orderId);const c=co(o.companyId);
      if(nameScore(b.desc,c)===0&&b.desc){c.aliases=c.aliases||[];if(!c.aliases.includes(b.desc.trim())){c.aliases.push(b.desc.trim());toast('입금자명 "'+b.desc+'"을(를) '+c.name+' 별칭으로 학습했습니다');}}}});
  const left=bankRemain(b);
  if(left>0&&document.getElementById('rc-fee').checked){
    DB.allocs.push({id:uid('a'),bankId:bid,targetType:'fee',targetId:null,amount:left,fee:0,date:b.date});}
  saveDB();closeModal();route();toast('배분 완료 (부분입금·분할배분 자동 반영)');}
function allocCancel(id){const a=byId(DB.allocs,id);

function csvModal(){
  openModal('<h3>통장 거래내역 가져오기</h3>'
  +'<div class="mini">형식: <span class="kbd">날짜,적요,입금액,출금액</span> (은행 CSV에서 해당 열 복사). 첫 줄이 제목이면 자동 건너뜀. 같은 내역 재업로드는 중복 감지로 자동 제외됩니다.</div>'
  +'<div class="frm" style="margin:10px 0"><div><label>은행 (이 내역의 출처 통장)</label><input id="csv-bank" value="'+esc((DB.settings.company||{}).bankName||'')+'" placeholder="예: 기업은행"></div></div>'
  +'<div style="margin:10px 0"><input type="file" accept=".csv,.txt" onchange="csvFile(this)"></div>'
  +'<textarea id="csv-text" rows="8" style="width:100%" placeholder="2026-07-02,(주)대한정밀,15510000,0&#10;2026-07-03,전기요금,0,182300"></textarea>'
  +'<div class="bar" style="margin-top:10px"><button class="pri" onclick="csvImport()">가져오기</button><button onclick="closeModal()">취소</button></div>');}
function csvFile(inp){const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{document.getElementById('csv-text').value=e.target.result;};r.readAsText(f,'utf-8');}
function csvImport(){
  const txt=document.getElementById('csv-text').value.trim();
  if(!txt){toast('내용이 없습니다');return;}
  let ok=0,dup=0,bad=0;
  txt.split(/\r?\n/).forEach(line=>{
    if(!line.trim())return;
    const cells=line.split(',').map(s=>s.trim().replace(/^"|"$/g,''));
    if(cells.length<3){bad++;return;}
    let date=cells[0].replace(/[.\/]/g,'-');
    if(!/^\d{4}-\d{1,2}-\d{1,2}/.test(date)){bad++;return;}
    date=date.slice(0,10);
    const desc=cells[1];
    const inAmt=Math.round(+String(cells[2]||'0').replace(/[^0-9.-]/g,''))||0;
    const outAmt=Math.round(+String(cells[3]||'0').replace(/[^0-9.-]/g,''))||0;
    const amount=inAmt>0?inAmt:-outAmt;
    if(!amount){bad++;return;}
    const bankNm=(document.getElementById('csv-bank')||{}).value||'';
    const hash=bankNm+'|'+date+'|'+desc+'|'+amount;
    if(DB.bank.some(b=>b.hash===hash)){dup++;return;}
    DB.bank.push({id:uid('b'),bank:bankNm,date,desc,amount,balance:null,hash,status:'unmatched',etcNote:''});ok++;});
  saveDB();closeModal();route();
  toast('가져오기: '+ok+'건 추가 · 중복 '+dup+'건 제외 · 형식오류 '+bad+'건');}

  +'</table></div>'
  +'<div class="card"><h3 style="margin-top:0">결재 설정</h3><div class="frm">'
  +'<div><label>발주 자동승인 한도 (공급가액, 원) — 초과 시 결재 필수</label><input class="r" id="set-limit" value="'+DB.settings.approvalLimit+'" '+(isApprover()?'':'disabled')+'></div>'
  +'<div><label>견적서 결재 필수</label><select id="set-qapv" '+(isApprover()?'':'disabled')+'><option value="1"'+(DB.settings.quoteApproval?' selected':'')+'>예 — 승인 후 발송/전환</option><option value="0"'+(DB.settings.quoteApproval?'':' selected')+'>아니오 — 결재 생략</option></select></div>'
  +'</div><div class="bar" style="margin-top:10px">'+(isApprover()?'<button class="pri" onclick="saveApvSettings()">설정 저장</button>':'<span class="mini">설정은 승인 권한자만 변경할 수 있습니다</span>')+'</div>'
  +'<div class="mini" style="margin-top:6px">설계 근거: 전건 결재 대신 "금액 한도 초과분만 승인"(Monitor·Odoo 패턴) + "승인 전 다음 단계 차단"(영림원 게이트). 메신저(알림톡) 카드 승인은 v3 후보.</div></div>';}
function saveApvSettings(){
  if(!isAdmin()){toast('결재 설정은 관리자만 변경할 수 있습니다');return;}
  DB.settings.approvalLimit=Math.round(+String(document.getElementById('set-limit').value).replace(/,/g,'')||0);
  DB.settings.quoteApproval=document.getElementById('set-qapv').value==='1';
  saveDB();route();toast('결재 설정이 저장되었습니다');}

/* ================= 7. 조회 / 장부 (읽기 전용) ================= */
function pageReports(M,sub){
  const [tab,qs]=String(sub||'ledger').split('?');
  const params={};(qs||'').split('&').forEach(kv=>{const[k,v]=kv.split('=');if(k)params[k]=v;});
  const t=[['cash','💰 현금 장부(통장)'],['accrual','🧾 전산 장부(계산서)'],['status','수금 현황'],['bank','통장 대사'],['ledger','거래처 원장'],['profit','수주별 손익'],['plan','수금계획 현황'],['history','매출·매입 이력'],['tis','세금계산서 목록'],['payable','미지급 현황'],['pricecmp','매입 단가 비교'],['kpi','📊 KPI'],['card','💳 카드내역']];
  let body='';
  if(tab==='cash')body=repCash();
  else if(tab==='accrual')body=repAccrual();
  else if(tab==='status')body=moneyStatus();
  else if(tab==='bank')body=bankList();
  else if(tab==='ledger')body=repLedger(params);
  else if(tab==='profit')body=repProfit();
  else if(tab==='plan')body=repPlan();
  else if(tab==='history')body=repHistory();
  else if(tab==='tis')body=repTis();
  else if(tab==='payable')body=repPayable();
  else if(tab==='kpi')body=repKpi();
  else if(tab==='card')body=repCard();
  else body=repPriceCmp();
  M.innerHTML='<h2>장부 (자금·통장·조회)</h2><div class="crumb">💰 현금 장부 = 통장 기준 "실제 돈" · 🧾 전산 장부 = 세금계산서 기준 "발생" — 두 장부의 차이가 곧 미수금·미지급금입니다</div>'
  +'<div class="tabs">'+t.map(x=>'<a href="#/reports/'+x[0]+'"'+(tab===x[0]?' class="on"':'')+'>'+x[1]+'</a>').join('')+'</div>'+body;}
function repLedger(params){
  const cid=params.c||window._ledgerC||(DB.companies.find(c=>c.type!=='purchase')||{}).id;
  window._ledgerC=cid;
  const from=window._ledgerFrom||today().slice(0,4)+'-01-01';
  const to=window._ledgerTo||today();
  const sel='<div class="bar"><select onchange="window._ledgerC=this.value;route()">'+DB.companies.map(c=>'<option value="'+c.id+'"'+(c.id===cid?' selected':'')+'>'+esc(c.name)+'</option>').join('')+'</select>'
  +'<input type="date" value="'+from+'" onchange="window._ledgerFrom=this.value;route()"> ~ <input type="date" value="'+to+'" onchange="window._ledgerTo=this.value;route()"></div>';
  if(!cid)return '<div class="card">'+sel+'거래처가 없습니다</div>';
  const c=co(cid);
  // 차변 = 매출 세금계산서(발행), 대변 = 입금 배분
  const debits=DB.taxInvoices.filter(t=>t.type==='sales'&&t.status==='sent'&&t.companyId===cid).map(t=>({date:t.date,desc:'세금계산서 '+t.no+(t.modifyReason?' (수정:'+t.modifyReason+')':'')+' — '+basisPlain(t),dr:t.supply+t.vat,cr:0,ti:t}));
  const credits=DB.allocs.filter(a=>{if(a.targetType!=='installment')return false;
    const i=byId(DB.installments,a.targetId);if(!i)return false;
    const o=byId(DB.orders,i.orderId);return o&&o.companyId===cid;}).map(a=>{
    const b=byId(DB.bank,a.bankId);const i=byId(DB.installments,a.targetId);const o=byId(DB.orders,i.orderId);
    return {date:a.date,desc:'입금 ('+esc(b?b.desc:'')+') → '+o.no+' '+i.seq+'회 '+i.name,dr:0,cr:a.amount};});
  const all=debits.concat(credits).sort((a,b)=>a.date<b.date?-1:1);
  const before=all.filter(r=>r.date<from);
  const rows=all.filter(r=>r.date>=from&&r.date<=to);
  let bal=before.reduce((s,r)=>s+r.dr-r.cr,0);
  const openBal=bal;
  let html='<div class="card">'+sel
  +'<h3 style="margin-top:4px">'+esc(c.name)+' 원장 <span class="mini">(차변=계산서 발행 / 대변=입금 배분 / 잔액=받을 돈)</span></h3>'
  +'<table><tr><th>일자</th><th>적요</th><th class="r">차변(매출)</th><th class="r">대변(입금)</th><th class="r">잔액</th></tr>'
  +'<tr style="background:#f8fafc"><td>'+from+'</td><td><b>전기 이월</b></td><td></td><td></td><td class="r num"><b>'+fmt(openBal)+'</b></td></tr>'
  +rows.map(r=>{bal+=r.dr-r.cr;
    return '<tr><td>'+r.date+'</td><td>'+r.desc+'</td><td class="r num">'+(r.dr?fmt(r.dr):'')+'</td><td class="r num">'+(r.cr?fmt(r.cr):'')+'</td><td class="r num">'+fmt(bal)+'</td></tr>';}).join('')
  +'<tr style="background:#f8fafc"><td colspan="2"><b>기말 잔액</b></td><td class="r num"><b>'+fmt(rows.reduce((s,r)=>s+r.dr,0))+'</b></td><td class="r num"><b>'+fmt(rows.reduce((s,r)=>s+r.cr,0))+'</b></td><td class="r num"><b style="color:var(--bad)">'+fmt(bal)+'</b></td></tr></table>'
  +'<div class="mini" style="margin-top:6px">참고: 미수금 관리는 계산서 기준이 아니라 [자금/통장대사 &gt; 수금 현황]의 수금계획(회차) 기준이 정확합니다. 원장은 세무·대조용입니다.</div></div>';
  return html;}
function basisPlain(ti){
  if(ti.basis==='order'){const o=byId(DB.orders,ti.basisId);return o?'수주 '+o.no:'';}
  if(ti.basis==='trans'){const d=byId(DB.trans,ti.basisId);return d?'납품 '+d.no:'';}
  if(ti.basis==='installment'){const i=byId(DB.installments,ti.basisId);if(!i)return '';
    const o=byId(DB.orders,i.orderId);return (o?o.no:'')+' '+i.seq+'회 '+i.name;}
  return '';}
function repProfit(){
  const rows=DB.orders.filter(o=>o.status!=='canceled').map(o=>{
    const t=lineTotals(o.lines);
    const pos=DB.pos.filter(p=>p.orderId===o.id);
    const poAmt=pos.reduce((s,p)=>s+lineTotals(p.lines).supply,0);
    const mat=orderMaterialCost(o.id);const lab=laborCost(o.id);
    const ins=orderInsts(o.id);
    const paid=ins.reduce((s,i)=>s+instAlloc(i.id),0);
    const plan=ins.reduce((s,i)=>s+i.amount,0);
    return {o,sup:t.supply,poAmt,mat,lab,hrs:laborHours(o.id),profit:t.supply-mat-lab,margin:t.supply?Math.round((t.supply-mat-lab)/t.supply*100):0,paid,recv:plan-paid};});
  return '<div class="card"><h3 style="margin-top:0">수주별 손익 <span class="mini">(원가 = 연결 발주의 입고 실적 자재비 · 노무비/경비 제외 — 제작 중에도 실시간 표시)</span></h3>'
  +'<table><tr><th>수주</th><th>거래처</th><th>상태</th><th class="r">계약액(공급가)</th><th class="r">발주액</th><th class="r">자재비 실적</th><th class="r">인력비(공수)</th><th class="r">이익</th><th class="r">이익률</th><th class="r">수금</th><th class="r">미수</th></tr>'
  +rows.map(r=>'<tr><td><a class="lnk" href="#/orders/view/'+r.o.id+'">'+r.o.no+'</a></td><td>'+esc(co(r.o.companyId).name)+'</td><td>'+badge('order',r.o.status)+'</td><td class="r num">'+fmt(r.sup)+'</td><td class="r num">'+fmt(r.poAmt)+'</td><td class="r num">'+fmt(r.mat)+'</td><td class="r num">'+fmt(r.lab)+' <span class="mini">('+r.hrs+'h)</span></td><td class="r num"'+(r.profit<0?' style="color:var(--bad)"':'')+'><b>'+fmt(r.profit)+'</b></td>'
  +'<td class="r"><span class="badge '+(r.margin<15?'b-red':r.margin<30?'b-amber':'b-green')+'">'+r.margin+'%</span></td><td class="r num">'+fmt(r.paid)+'</td><td class="r num"'+(r.recv>0?' style="color:var(--bad)"':'')+'>'+fmt(r.recv)+'</td></tr>').join('')
  +'</table></div>';}
function repPlan(){
  const f=window._planF||'all';
  const tm=thisMonth();const nm=addDays(tm+'-28',7).slice(0,7);
  const list=DB.installments.filter(i=>{const o=byId(DB.orders,i.orderId);if(!o||o.status==='canceled')return false;
    if(f==='month')return i.dueDate&&i.dueDate.startsWith(tm);
    if(f==='next')return i.dueDate&&i.dueDate.startsWith(nm);
    if(f==='overdue')return i.status!=='paid'&&i.dueDate&&i.dueDate<today();
    return true;}).sort((a,b)=>(a.dueDate||'')<(b.dueDate||'')?-1:1);
  const sum=s=>list.filter(x=>s?x.status===s:1).reduce((t,x)=>t+x.amount,0);
  return '<div class="card"><div class="bar">'
  +[['all','전체'],['month','이번달 ('+tm+')'],['next','다음달'],['overdue','연체']].map(x=>'<a class="lnk" style="'+(f===x[0]?'font-weight:bold':'')+'" onclick="window._planF=\''+x[0]+'\';route()">'+x[1]+'</a>').join(' · ')
  +'<div class="sp"></div><span class="mini">표시분 합계 <b class="num">'+fmt(sum())+'원</b></span></div>'
  +'<table><tr><th>예정일</th><th>수주</th><th>거래처</th><th>회차</th><th>시점</th><th class="r">금액</th><th class="r">입금</th><th>상태</th><th>계산서</th><th></th></tr>'
  +list.map(i=>{const o=byId(DB.orders,i.orderId);const late=i.status!=='paid'&&i.dueDate&&i.dueDate<today();
    return '<tr><td'+(late?' style="color:var(--bad);font-weight:bold"':'')+'>'+(i.dueDate||'')+'</td><td><a class="lnk" href="#/orders/view/'+o.id+'">'+o.no+'</a></td><td>'+esc(co(o.companyId).name)+'</td><td>'+i.seq+'회 '+esc(i.name)+'</td><td class="mini">'+esc(i.trigger||'')+'</td><td class="r num">'+fmt(i.amount)+'</td><td class="r num">'+fmt(instAlloc(i.id))+'</td><td>'+badge('inst',i.status)+'</td>'
    +'<td class="mini">'+(i.tiId?((byId(DB.taxInvoices,i.tiId)||{}).no||''):'-')+'</td>'
    +'<td>'+(i.status==='planned'?'<button class="sm" onclick="issueModal(\'installment\',\''+i.id+'\')">계산서 발행</button>':'')+'</td></tr>';}).join('')
  +'</table><div class="mini" style="margin-top:6px">"이번달·다음달 들어올 돈"이 이 화면입니다. 연체 필터로 독촉 대상을 뽑을 수 있습니다.</div></div>';}
function repHistory(){
  const list=DB.trans.slice().sort((a,b)=>a.date<b.date?1:-1);
  return '<div class="card"><h3 style="margin-top:0">매출·매입 이력 (거래명세서 기준)</h3>'
  +'<table><tr><th>일자</th><th>구분</th><th>번호</th><th>거래처</th><th>연결</th><th class="r">공급가액</th><th class="r">부가세</th><th class="r">합계</th><th>계산서</th></tr>'
  +list.map(d=>{const t=lineTotals(d.lines);
    const link=d.type==='sales'?(d.orderId?'<a class="lnk" href="#/orders/view/'+d.orderId+'">'+((byId(DB.orders,d.orderId)||{}).no||'')+'</a>':''):((d.poId?'<a class="lnk" href="#/po/view/'+d.poId+'">'+((byId(DB.pos,d.poId)||{}).no||'')+'</a>':''));
    return '<tr><td>'+d.date+'</td><td>'+(d.type==='sales'?'<span class="badge b-blue">매출</span>':'<span class="badge b-purple">매입</span>')+'</td><td><a class="lnk" onclick="dlView(\''+d.id+'\')">'+d.no+'</a></td><td>'+esc(co(d.companyId).name)+'</td><td>'+link+'</td><td class="r num">'+fmt(t.supply)+'</td><td class="r num">'+fmt(t.vat)+'</td><td class="r num"><b>'+fmt(t.total)+'</b></td><td>'+badge('trans',d.status)+'</td></tr>';}).join('')
  +'</table></div>';}
function repTis(){
  const list=DB.taxInvoices.slice().sort((a,b)=>a.date<b.date?1:-1);
  return '<div class="card"><h3 style="margin-top:0">세금계산서 통합 목록 (매출+매입)</h3>'
  +'<table><tr><th>작성일</th><th>구분</th><th>번호</th><th>거래처</th><th>발행근거</th><th class="r">공급가액</th><th class="r">세액</th><th class="r">합계</th><th>상태</th></tr>'
  +list.map(ti=>'<tr'+(ti.supply<0?' style="color:var(--bad)"':'')+'><td>'+ti.date+'</td><td>'+(ti.type==='sales'?'<span class="badge b-blue">매출</span>':'<span class="badge b-purple">매입</span>')+'</td><td>'+ti.no+(ti.originalId?' <span class="badge b-red">수정</span>':'')+'</td><td>'+esc(co(ti.companyId).name)+'</td><td>'+basisLink(ti)+'</td><td class="r num">'+fmt(ti.supply)+'</td><td class="r num">'+fmt(ti.vat)+'</td><td class="r num">'+fmt(ti.supply+ti.vat)+'</td><td>'+badge('ti',ti.status)+'</td></tr>').join('')
  +'</table><div class="mini" style="margin-top:6px">부가세 신고 대사용: 매출/매입 합계를 홈택스 내역과 비교하세요. (추후 홈택스 자료비교 연동 자리)</div></div>';}
function repPriceCmp(){
  const q=window._pcQ||'';const br=window._pcBr||'';
  const brands=[...new Set(DB.items.map(i=>i.brand).filter(Boolean))];
  const items=DB.items.filter(i=>i.active&&(!br||(i.brand||'')===br)&&((i.name+' '+(i.brand||'')+' '+(i.code||'')).includes(q)));
  let rows='';
  items.forEach(it=>{const srcs=itemSources(it.id);
    if(!srcs.length){rows+='<tr><td><b>'+esc(it.name)+'</b></td><td>'+esc(it.brand||'')+'</td><td class="r num">'+fmt(it.buyPrice)+'</td><td colspan="4" class="mini">구매처 이력/등록 단가 없음 — 기준 매입가만</td></tr>';return;}
    const min=Math.min.apply(null,srcs.filter(x=>x.eff!=null).map(x=>x.eff));
    srcs.sort((a,b)=>(a.eff||9e15)-(b.eff||9e15)).forEach((x,i)=>{
      rows+='<tr>'+(i===0?'<td rowspan="'+srcs.length+'"><b>'+esc(it.name)+'</b></td><td rowspan="'+srcs.length+'">'+esc(it.brand||'')+'</td><td class="r num" rowspan="'+srcs.length+'">'+fmt(it.buyPrice)+'</td>':'')
      +'<td><a class="lnk" href="#/companies/view/'+x.cid+'">'+esc(x.name)+'</a>'+(x.eff===min?' <span class="badge b-green">최저가</span>':'')+'</td>'
      +'<td class="r num">'+(x.std!=null?fmt(x.std):'-')+'</td><td class="r num">'+(x.last!=null?fmt(x.last):'-')+'</td><td class="mini">'+x.lastDate+'</td></tr>';});});
  return '<div class="card"><div class="bar"><b>매입 단가 비교 — 납품처·브랜드별 정리</b>'
  +'<input placeholder="품목/브랜드/코드 검색" style="width:180px" value="'+esc(q)+'" onchange="window._pcQ=this.value;route()">'
  +'<select onchange="window._pcBr=this.value;route()"><option value="">전체 브랜드</option>'+brands.map(b=>'<option value="'+esc(b)+'"'+(br===b?' selected':'')+'>'+esc(b)+'</option>').join('')+'</select>'
  +'<div class="sp"></div><span class="mini">등록 단가 = 업체별/협상 종가 · 실매입가 = 입고 전표(정산가)</span></div>'
  +'<table><tr><th>품목</th><th>브랜드</th><th class="r">기준 매입가</th><th>납품처</th><th class="r">등록 단가</th><th class="r">최근 실매입가</th><th>최근 매입일</th></tr>'
  +(rows||'<tr><td colspan="7" class="mini">품목 없음</td></tr>')+'</table>'
  +'<div class="mini" style="margin-top:6px">최저가 배지는 참고용입니다 — 납기·품질 사정으로 다른 납품처를 쓸 수 있으며, 발주 작성 화면에서도 품목마다 추천 납품처가 함께 표시됩니다.</div></div>';}
function repPayable(){
  const rows=DB.taxInvoices.filter(t=>t.type==='purchase'&&t.status==='sent').map(ti=>{
    const paid=ptransAlloc(ti.basisId);
    return {ti,paid,unpaid:ti.supply+ti.vat-paid};});
  const tot=rows.reduce((s,r)=>s+r.unpaid,0);
  return '<div class="card"><h3 style="margin-top:0">미지급 현황 (매입계산서 − 출금 배분)</h3>'
  +'<table><tr><th>작성일</th><th>계산서</th><th>공급처</th><th>근거</th><th class="r">합계</th><th class="r">지급</th><th class="r">미지급</th></tr>'
  +rows.map(r=>'<tr><td>'+r.ti.date+'</td><td>'+r.ti.no+'</td><td>'+esc(co(r.ti.companyId).name)+'</td><td>'+basisLink(r.ti)+'</td><td class="r num">'+fmt(r.ti.supply+r.ti.vat)+'</td><td class="r num">'+fmt(r.paid)+'</td><td class="r num"'+(r.unpaid>0?' style="color:var(--bad);font-weight:bold"':'')+'>'+fmt(r.unpaid)+'</td></tr>').join('')
  +'<tr><td colspan="6" style="text-align:right"><b>미지급 합계</b></td><td class="r num"><b style="color:var(--bad)">'+fmt(tot)+'</b></td></tr></table>'
  +'<div class="mini" style="margin-top:6px">지급(출금) 대사는 [자금/통장대사 &gt; 통장 내역]에서 출금 건에 [배분]으로 처리합니다.</div></div>';}
